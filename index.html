<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA J.D.P ENGENHARIA PAY</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        :root { --ouro: #FFD700; --preto: #000000; }
        body { background-color: var(--preto); color: var(--ouro); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .card { border: 2px solid var(--ouro); padding: 30px; border-radius: 20px; box-shadow: 0 0 25px rgba(255, 215, 0, 0.3); width: 100%; max-width: 400px; }
        h1 { font-size: 22px; margin-bottom: 20px; text-transform: uppercase; }
        input { width: 90%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid var(--ouro); background: #111; color: var(--ouro); font-size: 24px; text-align: center; font-weight: bold; }
        #walletWidget { margin-top: 20px; }
        .instrucao { font-size: 14px; color: #aaa; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Dony Burguer's Pay</h1>
    <p>Engenharia de Pagamento J.D.P</p>
    
    <input type="number" id="valor-input" value="1.00" step="0.01">
    
    <div id="walletWidget"></div>

    <p class="instrucao">Ao clicar, escolha PIX ou Cartão por Aproximação na tela segura.</p>
</div>

<script>
    const mp = new MercadoPago('APP_USR-2926a3cc-27f2-49fb-be7b-277852f5afd5');

    async function atualizarBotao() {
        const valor = document.getElementById('valor-input').value;
        const container = document.getElementById('walletWidget');
        container.innerHTML = "Limpando motor...";

        try {
            const response = await fetch("https://api.mercadopago.com/checkout/preferences", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer APP_USR-2671749910685862-122921-b5b8088c9f6832d1f722c1ed95dd475f-3100673895"
                },
                body: JSON.stringify({
                    items: [{ title: "Venda Dony Burguer's", quantity: 1, unit_price: parseFloat(valor), currency_id: "BRL" }],
                    payment_methods: { installments: 1 },
                    back_urls: { success: window.location.href, failure: window.location.href }
                })
            });

            const preference = await response.json();
            container.innerHTML = "";
            mp.bricks().create("wallet", "walletWidget", {
                initialization: { preferenceId: preference.id },
                customization: { texts: { valueProp: 'smart_option' } }
            });
        } catch (e) {
            container.innerHTML = "Erro de Conexão. Verifique o Token.";
        }
    }

    document.getElementById('valor-input').addEventListener('change', atualizarBotao);
    atualizarBotao();
</script>

</body>
</html>
